<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#003DA5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CondoVE SGC" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/IsotipoMarca-CondoVe-logo-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/IsotipoMarca-CondoVe-logo-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/IsotipoMarca-CondoVe-logo-512x512.png" />

    <title>CondoVE SGC — Sistema de Gestión Condominial</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Registrar Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('SW error:', err))
        })
      }
    </script>
  </body>
</html>
